services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Defaults to ./checkpoints for local dev. On the server, PUMA_MODELS_HOST_DIR
      # points to a stable path OUTSIDE the git checkout — checkpoints/ is gitignored
      # (large, regeneratable binaries), so it's empty right after `git checkout`/CI.
      - ${PUMA_MODELS_HOST_DIR:-./checkpoints}:/models:ro
    environment:
      - PUMA_CHECKPOINT_DIR=/models
    restart: unless-stopped

  # Phase 4 — observability
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      # Change this before exposing Grafana beyond your own Tailscale network.
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    depends_on:
      - prometheus
